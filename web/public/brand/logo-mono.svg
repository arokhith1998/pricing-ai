<!-- Pricekeel mark — monochrome variant for invoices, PDF reports, grayscale
     contexts. Single colour, currentColor so it inherits the parent text
     colour when embedded inline. Use this on payment receipts, slide decks
     in monochrome, the favicon mask on iOS pinned tabs, etc. -->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 64 64"
     width="64" height="64"
     role="img" aria-label="Pricekeel">
  <title>Pricekeel</title>
  <line
    x1="10" y1="26" x2="54" y2="26"
    stroke="currentColor"
    stroke-width="3"
    stroke-linecap="round"
    opacity="0.55" />
  <path
    d="M 14 26 Q 34 60 50 26"
    fill="none"
    stroke="currentColor"
    stroke-width="5"
    stroke-linecap="round"
    stroke-linejoin="round" />
</svg>
